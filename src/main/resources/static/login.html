<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #1877f2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #166fe5;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            text-decoration: none;
            color: #1877f2;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="text" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- Navigation -->
    <p class="link">
        New Student? <a href="register.html">Register here</a>
    </p>

    <p id="message"></p>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {

        e.preventDefault();

        // 🟢 EDIT 1: Create JSON object instead of separate variables
let data = {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
};

// 🟢 EDIT 2: Replace GET request with POST + JSON
fetch("/users/login", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
})
        .then(response => response.text())
        .then(data => {
            document.getElementById("message").innerText = data;
        })
        .catch(error => {
            document.getElementById("message").innerText = "Something went wrong!";
        });

    });
</script>

</body>
</html>
